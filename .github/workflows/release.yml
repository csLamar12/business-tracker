name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact_name: BusinessTracker-mac.zip
          - os: windows-latest
            platform: windows
            artifact_name: BusinessTracker-windows.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Write config from secrets
        shell: bash
        env:
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
        run: |
          # Bake credentials into config.py so the shipped app works with zero
          # user setup (same pattern already used for the Turso token). The SMTP
          # values enable @-mention emails; if the SMTP_APP_PASSWORD secret is
          # unset, email is simply skipped and in-app + desktop notifications
          # still work.
          cat > config.py <<EOF
          import os
          TURSO_URL = os.environ.get("TURSO_URL", "${TURSO_URL}")
          TURSO_TOKEN = os.environ.get("TURSO_TOKEN", "${TURSO_TOKEN}")
          SMTP_HOST = os.environ.get("SMTP_HOST", "smtp.gmail.com")
          SMTP_PORT = int(os.environ.get("SMTP_PORT", "465"))
          SMTP_USER = os.environ.get("SMTP_USER", "${SMTP_USER:-anchorpointsystemsltd@gmail.com}")
          SMTP_APP_PASSWORD = os.environ.get("SMTP_APP_PASSWORD", "${SMTP_APP_PASSWORD}")
          EOF

      - name: Build (macOS)
        if: matrix.platform == 'mac'
        run: |
          pyinstaller --noconfirm --windowed \
            --name "BusinessTracker" \
            --osx-bundle-identifier com.anchorpointja.businesstracker \
            --collect-all customtkinter \
            --collect-all tkcalendar \
            --collect-all babel \
            --collect-all libsql \
            main.py
          cd dist
          zip -r BusinessTracker-mac.zip BusinessTracker.app

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          pyinstaller --noconfirm --windowed \
            --name "BusinessTracker" \
            --collect-all customtkinter \
            --collect-all tkcalendar \
            --collect-all babel \
            --collect-all libsql \
            --collect-all winotify \
            main.py
          cd dist
          7z a BusinessTracker-windows.zip BusinessTracker

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact_name }}
          generate_release_notes: true
