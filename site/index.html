<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AnchorPoint Business Tracker</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: #0e0e10; color: #f5f5f5;
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .card {
      max-width: 480px; width: 100%; text-align: center;
      padding: 40px 32px; background: #1c1c20; border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    h1 { margin: 0 0 8px; font-size: 28px; letter-spacing: -0.02em; }
    p.tag { margin: 0 0 28px; color: #888; }
    a.btn {
      display: inline-block; padding: 14px 28px; border-radius: 10px;
      background: #1f6aa5; color: white; text-decoration: none;
      font-weight: 600; transition: background 0.15s;
    }
    a.btn:hover { background: #2a7fc4; }
    a.alt { display: inline-block; margin-top: 18px; color: #888; font-size: 14px; }
    a.alt:hover { color: #ccc; }
    .ver { margin-top: 32px; font-size: 12px; color: #555; }
    .ver a { color: #777; }
  </style>
</head>
<body>
  <div class="card">
    <h1>AnchorPoint Business Tracker</h1>
    <p class="tag">Track businesses, subsidiaries, income & expenses.</p>

    <a id="primary" class="btn" href="#">Detecting your OS…</a>
    <div>
      <a id="other" class="alt" href="#">Need the other version?</a>
    </div>

    <p class="ver">
      Always installs the latest release.
      <br>
      <a href="https://github.com/csLamar12/business-tracker/releases" target="_blank">All releases</a>
    </p>
  </div>

  <script>
    const REPO = "csLamar12/business-tracker";
    const MAC_URL = `https://github.com/${REPO}/releases/latest/download/BusinessTracker-mac.zip`;
    const WIN_URL = `https://github.com/${REPO}/releases/latest/download/BusinessTracker-windows.zip`;

    const ua = navigator.userAgent.toLowerCase();
    const isMac = ua.includes("mac");
    const isWin = ua.includes("win");

    const primary = document.getElementById("primary");
    const other = document.getElementById("other");

    if (isMac) {
      primary.href = MAC_URL;
      primary.textContent = "Download for macOS";
      other.href = WIN_URL;
      other.textContent = "Download for Windows instead";
    } else if (isWin) {
      primary.href = WIN_URL;
      primary.textContent = "Download for Windows";
      other.href = MAC_URL;
      other.textContent = "Download for macOS instead";
    } else {
      primary.href = MAC_URL;
      primary.textContent = "Download for macOS";
      other.href = WIN_URL;
      other.textContent = "Download for Windows";
    }
  </script>
</body>
</html>
